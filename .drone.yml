---
kind: pipeline
type: docker
name: default

clone:
  depth: 150

steps:
  - name: check-python
    image: ghcr.io/astral-sh/ruff:latest 
    command: [ "check", "." ]

  - name: check-custom
    image: debian:bookworm
    commands:
      - apt update
      # Install required packages
      - apt install --yes coreutils sed grep libxml2-utils git findutils perl-base file mediainfo curl
      # Check whether non-EN news item would appear on front-page
      - bash tools/check-non-en-frontpage.sh news
      # Run pre-commit checks
      - bash tools/githooks/pre-commit ci-pr
      # Check syntax for all files as a safety net
      - find . -type f \( -iname "*.xhtml" -o -iname "*.xml" -o -iname "*.xsl" \) -exec xmllint --noout {} +

  - name: deploy-test
    image: docker:27.4.1
    environment:
      # Environment variables necessary for rootless Docker
      XDG_RUNTIME_DIR: "/run/user/1001"
      DOCKER_HOST: "unix:///run/user/1001/docker.sock"
      TARGET: "www@bunsen.fsfeurope.org:test.fsfe.org/global/,www@noddack.fsfeurope.org:test.fsfe.org/global/,www@gahn.fsfeurope.org:test.fsfe.org/global/"
      KEY_PRIVATE:
        from_secret: KEY_PRIVATE
      KEY_PASSWORD:
        from_secret: KEY_PASSWORD
    volumes:
      # Mounting Docker socket of rootless docker user
      - name: dockersock
        path: /run/user/1001/docker.sock
    commands:
      - docker ps && echo "tampered with"
      - docker compose down
      - docker compose pull --ignore-buildable --include-deps
      - docker compose -p fsfe-website run --build build --target "$TARGET"
    when:
      branch:
      - test
      event:
        exclude:
        - pull_request
trigger:
  branch:
    - master
    - test
  event:
    - push
    - pull_request

node:
  cont1: plutex

volumes:
  # Define Docker socket of rootless docker user
  - name: dockersock
    host:
      path: /run/user/1001/docker.sock
---
