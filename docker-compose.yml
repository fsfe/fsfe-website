services:
  pre-commit:
    build:
      context: .
      dockerfile: pre-commit.Dockerfile
    image: fsfe-websites-pre-commit
    volumes:
      - ${FSFE_WEBSITE_SOURCE_PATH:-./}:/website-source
  build:
    build:
      context: .
      dockerfile: build.Dockerfile
    image: fsfe-websites-build
    ports:
      - 2000:2000
      - 2100:2100
      - 2200:2200
      - 2300:2300
      - 2400:2400
      - 2500:2500
    secrets:
      - FSFE_WEBSITE_KEY_PRIVATE
      - FSFE_WEBSITE_KEY_PASSWORD
      - FSFE_WEBSITE_GIT_TOKEN
    volumes:
      - ${FSFE_WEBSITE_SOURCE_PATH:-./}:/website-source
      - ${FSFE_WEBSITE_VOLUME:-website-cached}:/website-cached
volumes:
  website-cached:
  website-cached-master:
secrets:
  FSFE_WEBSITE_KEY_PRIVATE:
    environment: KEY_PRIVATE
  FSFE_WEBSITE_KEY_PASSWORD:
    environment: KEY_PASSWORD
  FSFE_WEBSITE_GIT_TOKEN:
    environment: GIT_TOKEN
