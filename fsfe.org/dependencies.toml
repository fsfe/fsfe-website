# Sources for the website
[bootstrap-js]
repo = "https://github.com/twbs/bootstrap"
rev = "v3.0.3"
file_sets = [
  { source = "dist/js/bootstrap.min.js", target = "scripts/thirdparty/bootstrap.min.js" },
]
[jquery]
repo = "https://github.com/jquery/jquery"
rev = "3.5.1"
file_sets = [
  { source = "dist/jquery.min.js", target = "scripts/thirdparty/" },
  { source = "dist/jquery.min.map", target = "scripts/thirdparty/" },
]
[lunr]
repo = "https://github.com/olivernn/lunr.js"
rev = "v2.3.9"
file_sets = [{ source = "lunr.js", target = "scripts/thirdparty/lunr.min.js" }]
# STYLING
[bootstrap-less]
repo = "https://github.com/twbs/bootstrap"
rev = "v3.4.1"
file_sets = [{ source = "less/", target = "look/thirdparty/bootstrap" }]
# CGI
[phpmailer]
repo = "https://github.com/PHPMailer/PHPMailer"
rev = "v6.10.0"
file_sets = [{ source = "src", target = "cgi-bin/thirdparty/PHPMailer" }]
