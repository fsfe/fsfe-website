services:
  build:
    build: .
    image: fsfe-websites
    container_name: fsfe-websites
    networks:
      - fsfe-websites_network
    ports:
      - 2000:2000
      - 2100:2100
      - 2200:2200
      - 2300:2300
      - 2400:2400
      - 2500:2500
    secrets:
      - KEY_PRIVATE
      - KEY_PASSWORD
    volumes:
      - website-cached:/website-cached
volumes:
  website-cached:
secrets:
  KEY_PRIVATE:
    environment: KEY_PRIVATE
  KEY_PASSWORD:
    environment: KEY_PASSWORD
networks:
 fsfe-websites_network:
   enable_ipv6: true
   ipam:
     config:
       - subnet: 2001:db8::/64
