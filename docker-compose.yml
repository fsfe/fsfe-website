services:
  pre-commit:
    build:
      context: .
      dockerfile: pre-commit.Dockerfile
    image: fsfe-websites-pre-commit
    volumes:
      - ./:/website-source
  build:
    build:
      context: .
      dockerfile: build.Dockerfile
    image: fsfe-websites-build
    ports:
      - 2000:2000
      - 2100:2100
      - 2200:2200
      - 2300:2300
      - 2400:2400
      - 2500:2500
    secrets:
      - KEY_PRIVATE
      - KEY_PASSWORD
      - GIT_TOKEN
    volumes:
      - ./:/website-source
      - ${VOLUME:-website-cached}:/website-cached
volumes:
  website-cached:
  website-cached-master:
secrets:
  KEY_PRIVATE:
    environment: KEY_PRIVATE
  KEY_PASSWORD:
    environment: KEY_PASSWORD
  GIT_TOKEN:
    environment: GIT_TOKEN
